# deepBlack Yazi configuration
# General behavior only. Visual language is generated into theme.toml.

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true
scrolloff = 5

[preview]
wrap = "no"
tab_size = 2
max_width = 1200
max_height = 1800
image_delay = 30
image_filter = "triangle"
image_quality = 75

[input]
cursor_blink = false
