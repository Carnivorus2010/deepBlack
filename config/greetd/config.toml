[terminal]
vt = 1

[default_session]
command = "tuigreet --greeting 'deepBlack' --time --time-format '%Y-%m-%d  %H:%M' --width 64 --container-padding 2 --prompt-padding 1 --greet-align center --theme 'container=black;border=green;title=green;greet=green;text=white;time=white;prompt=green;input=white;action=white;button=green' --remember --asterisks --cmd /usr/local/bin/deepblack-session"
user = "greeter"
